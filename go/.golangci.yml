version: "2"

linters:
  enable:
    - bodyclose
    - gosec
    - noctx
  disable:
    - exhaustruct
    - staticcheck
  settings:
    gosec:
      excludes:
        - G204
        - G304
        - G402
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - linters:
          - errcheck
          - gosec
          - noctx
        path: _test\.go
    paths:
      - third_party$
      - builtin$
      - examples$

formatters:
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
