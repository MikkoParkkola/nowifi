version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Amsterdam
    open-pull-requests-limit: 5

  - package-ecosystem: gomod
    directory: /go
    schedule:
      interval: weekly
      day: monday
      time: "06:30"
      timezone: Europe/Amsterdam
    open-pull-requests-limit: 5
