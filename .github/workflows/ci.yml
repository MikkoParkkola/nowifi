name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

# Cancel superseded runs on the same PR ref — a rapid re-push stops paying for
# the outdated matrix instead of running it to completion. Push-to-main keeps
# running (no cancel) so every landed commit gets a full signal.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  test:
    timeout-minutes: 20
    strategy:
      matrix:
        # macOS billed at 10x. Pure Go (CGO_ENABLED=0) cross-compiles from Linux;
        # release.yml already ships all darwin/linux targets from ubuntu-latest.
        # Per-PR macOS added cost + a documented 7h macos-13 agent queue for no
        # extra signal.
        os: [ubuntu-latest]
        # Pinned toolchain only. 'stable' resolved to the same 1.26.x, so the
        # matrix ran the whole -race suite twice for identical Go. Drop it; the
        # pin (per CLAUDE.md reproducibility rule) is the shipping toolchain.
        # When Go 1.27 lands, bump the pin to re-test the new floor.
        go-version: ['1.26']
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go-version }}
          cache-dependency-path: go/go.sum

      - name: Build
        working-directory: go
        run: make build

      - name: Vet
        working-directory: go
        run: make vet

      - name: Test
        working-directory: go
        run: make test GO_TESTFLAGS='-race -count=1'

      - name: Test Coverage
        if: matrix.go-version == '1.26'
        working-directory: go
        run: make test-coverage

  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: actions/setup-go@v6
        with:
          go-version: 'stable'
          cache-dependency-path: go/go.sum

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11.4
          install-mode: goinstall
          working-directory: go

      - name: Install staticcheck
        run: go install honnef.co/go/tools/cmd/staticcheck@latest

      - name: Staticcheck
        working-directory: go
        run: |
          "$(go env GOPATH)/bin/staticcheck" ./...

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Vulnerability check
        working-directory: go
        run: |
          "$(go env GOPATH)/bin/govulncheck" ./...
