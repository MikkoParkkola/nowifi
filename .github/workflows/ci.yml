name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

# PR runs are keyed by PR number so a rapid re-push cancels the superseded
# matrix instead of paying for it. Push-to-main falls back to the unique run_id,
# giving every landed commit its own group — never cancelled, never evicted from
# the single-pending-run slot — so main always gets a full signal.
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  test:
    timeout-minutes: 20
    strategy:
      matrix:
        # macOS billed at 10x; pure Go (CGO_ENABLED=0) cross-compiles from Linux
        # and release.yml ships every darwin/linux target from ubuntu — a per-PR
        # macOS leg adds cost + queue time for no extra signal.
        os: [ubuntu-latest]
        # 'stable' resolved to the same 1.26.x, so the -race suite ran twice for
        # identical Go. Keep only the pinned toolchain (the shipping one); bump
        # the pin when a new Go floor lands.
        go-version: ['1.26']
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go-version }}
          cache-dependency-path: go.sum

      - name: Build
        run: make build

      - name: Vet
        run: make vet

      - name: Test
        run: make test GO_TESTFLAGS='-race -count=1'

      # macOS is off the matrix (10x cost), but darwin-tagged files (menubar,
      # tun_darwin, platform/darwin) are invisible to `go test` on Linux. A
      # GOOS=darwin cross-compile compile-checks that code every PR at ~1x Linux
      # cost — no macOS runner. Pure Go (no cgo), so CGO_ENABLED=0 is correct and
      # matches the shipped release build. Darwin-only runtime tests still run on
      # release/native.
      - name: Cross-compile darwin (build-tag coverage)
        run: GOOS=darwin GOARCH=arm64 go build ./...

      - name: Test Coverage
        if: matrix.go-version == '1.26'
        run: make test-coverage

  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false

      - uses: actions/setup-go@v6
        with:
          go-version: 'stable'
          cache-dependency-path: go.sum

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11.4
          install-mode: goinstall

      - name: Install staticcheck
        run: go install honnef.co/go/tools/cmd/staticcheck@latest

      - name: Staticcheck
        run: |
          "$(go env GOPATH)/bin/staticcheck" ./...

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Vulnerability check
        run: |
          "$(go env GOPATH)/bin/govulncheck" ./...

  # Fast layer of the dependency-vulnerability gate: scans go.mod against the
  # OSV database on every PR and push. Fails the build on any known, fixable
  # vuln so a security fix lands with the change that introduces (or fails to
  # bump past) it — not weeks later. govulncheck (in the `lint` job) stays as
  # the reachability-aware Go signal; osv-scanner is broader — it flags
  # vulnerable deps even when no reachable call path exists. Accepted/unfixable
  # vulns are time-boxed in .github/osv-scanner.toml. The release.yml
  # `security-gate` job is the backstop. (No Docker image is built, so no trivy
  # image scan is needed.)
  osv-scan:
    name: OSV vulnerability scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - name: Scan Go dependencies against OSV
        uses: google/osv-scanner-action/osv-scanner-action@9a498708959aeaef5ef730655706c5a1df1edbc2 # v2.3.8
        with:
          scan-args: |-
            --config=.github/osv-scanner.toml
            --no-call-analysis=all
            --recursive
            ./
