name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to rebuild and publish, for example v0.14.3'
        required: true
        type: string

permissions:
  attestations: write
  artifact-metadata: write
  contents: write
  id-token: write

env:
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

jobs:
  build:
    name: Build ${{ matrix.target }}
    timeout-minutes: 15
    # CGO_ENABLED=0 means pure-Go cross-compilation: any single host
    # can produce all four binaries. Pinning the whole matrix to
    # ubuntu-latest avoids the Intel-mac runner pool starvation that
    # had v0.14.1 queued for 7+ hours waiting on a `macos-13` agent.
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: darwin-arm64
            goos: darwin
            goarch: arm64
          - target: darwin-amd64
            goos: darwin
            goarch: amd64
          - target: linux-amd64
            goos: linux
            goarch: amd64
          - target: linux-arm64
            goos: linux
            goarch: arm64

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ env.RELEASE_TAG }}
          persist-credentials: false

      - uses: actions/setup-go@v6
        with:
          go-version: 'stable'
          cache-dependency-path: go/go.sum

      - name: Install SBOM generator
        working-directory: go
        run: |
          go install github.com/CycloneDX/cyclonedx-gomod/cmd/cyclonedx-gomod@v1.10.0

      - name: Build
        working-directory: go
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        run: |
          VERSION="${RELEASE_TAG#v}"
          go build \
            -trimpath \
            -ldflags "-s -w -X main.version=${VERSION}" \
            -o "bin/nowifi-${{ matrix.target }}" \
            ./cmd/nowifi

      - name: Generate SBOM
        working-directory: go
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        run: |
          "${HOME}/go/bin/cyclonedx-gomod" \
            app \
            -json \
            -licenses \
            -packages \
            -main cmd/nowifi \
            -output "bin/nowifi-${{ matrix.target }}.sbom.cdx.json" \
            .

      - name: Package
        working-directory: go/bin
        run: |
          tar czf "nowifi-${{ matrix.target }}.tar.gz" "nowifi-${{ matrix.target }}"
          shasum -a 256 "nowifi-${{ matrix.target }}.tar.gz" > "nowifi-${{ matrix.target }}.tar.gz.sha256"
          shasum -a 256 "nowifi-${{ matrix.target }}.sbom.cdx.json" > "nowifi-${{ matrix.target }}.sbom.cdx.json.sha256"

      - uses: actions/upload-artifact@v7
        with:
          name: nowifi-${{ matrix.target }}
          path: |
            go/bin/nowifi-${{ matrix.target }}.tar.gz
            go/bin/nowifi-${{ matrix.target }}.tar.gz.sha256
            go/bin/nowifi-${{ matrix.target }}.sbom.cdx.json
            go/bin/nowifi-${{ matrix.target }}.sbom.cdx.json.sha256

  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ env.RELEASE_TAG }}
          persist-credentials: false

      - uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      - name: Aggregate checksums
        working-directory: dist
        run: |
          ls -la
          cat ./*.sha256 | sort -k2 > /tmp/checksums.sha256
          rm -f ./*.sha256
          mv /tmp/checksums.sha256 checksums.sha256
          ls -la

      - name: Install Cosign
        uses: sigstore/cosign-installer@v4.1.2
        with:
          cosign-release: 'v3.0.6'

      - name: Sign release files
        working-directory: dist
        run: |
          for artifact in ./*.tar.gz ./*.sbom.cdx.json ./checksums.sha256; do
            cosign sign-blob \
              --yes \
              --bundle "${artifact}.sigstore.json" \
              "${artifact}"
          done

      - name: Attest release files
        uses: actions/attest-build-provenance@v4.1.0
        with:
          subject-path: |
            dist/*.tar.gz
            dist/*.sbom.cdx.json
            dist/checksums.sha256

      - name: Upload to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release view "${RELEASE_TAG}" >/dev/null 2>&1 || \
            gh release create "${RELEASE_TAG}" \
              --title "${RELEASE_TAG}" \
              --notes "Release ${RELEASE_TAG}"
          gh release upload "${RELEASE_TAG}" dist/* --clobber
