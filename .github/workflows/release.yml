name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    timeout-minutes: 15
    # CGO_ENABLED=0 means pure-Go cross-compilation: any single host
    # can produce all four binaries. Pinning the whole matrix to
    # ubuntu-latest avoids the Intel-mac runner pool starvation that
    # had v0.14.1 queued for 7+ hours waiting on a `macos-13` agent.
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: darwin-arm64
            goos: darwin
            goarch: arm64
          - target: darwin-amd64
            goos: darwin
            goarch: amd64
          - target: linux-amd64
            goos: linux
            goarch: amd64
          - target: linux-arm64
            goos: linux
            goarch: arm64

    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: actions/setup-go@v6
        with:
          go-version: 'stable'
          cache-dependency-path: go/go.sum

      - name: Build
        working-directory: go
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          go build \
            -trimpath \
            -ldflags "-s -w -X main.version=${VERSION}" \
            -o "bin/nowifi-${{ matrix.target }}" \
            ./cmd/nowifi

      - name: Package
        working-directory: go/bin
        run: |
          tar czf "nowifi-${{ matrix.target }}.tar.gz" "nowifi-${{ matrix.target }}"
          shasum -a 256 "nowifi-${{ matrix.target }}.tar.gz" > "nowifi-${{ matrix.target }}.tar.gz.sha256"

      - uses: actions/upload-artifact@v7
        with:
          name: nowifi-${{ matrix.target }}
          path: |
            go/bin/nowifi-${{ matrix.target }}.tar.gz
            go/bin/nowifi-${{ matrix.target }}.tar.gz.sha256

  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      - name: Aggregate checksums
        working-directory: dist
        run: |
          ls -la
          cat *.sha256 > /tmp/checksums.sha256
          rm -f *.sha256
          mv /tmp/checksums.sha256 checksums.sha256
          ls -la

      - name: Upload to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1 || \
            gh release create "${GITHUB_REF_NAME}" \
              --title "${GITHUB_REF_NAME}" \
              --notes "Release ${GITHUB_REF_NAME}"
          gh release upload "${GITHUB_REF_NAME}" dist/*.tar.gz dist/checksums.sha256 --clobber
