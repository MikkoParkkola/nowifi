name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: darwin-arm64
            goos: darwin
            goarch: arm64
          - os: macos-15-intel   # Intel runner
            target: darwin-amd64
            goos: darwin
            goarch: amd64
          - os: ubuntu-latest
            target: linux-amd64
            goos: linux
            goarch: amd64
          - os: ubuntu-latest
            target: linux-arm64
            goos: linux
            goarch: arm64

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: 'stable'

      - name: Build
        working-directory: go
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          go build \
            -trimpath \
            -ldflags "-s -w -X main.version=${VERSION}" \
            -o "bin/nowifi-${{ matrix.target }}" \
            ./cmd/nowifi

      - name: Package
        working-directory: go/bin
        run: |
          tar czf "nowifi-${{ matrix.target }}.tar.gz" "nowifi-${{ matrix.target }}"
          shasum -a 256 "nowifi-${{ matrix.target }}.tar.gz" > "nowifi-${{ matrix.target }}.tar.gz.sha256"

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: nowifi-${{ matrix.target }}
          path: |
            go/bin/nowifi-${{ matrix.target }}.tar.gz
            go/bin/nowifi-${{ matrix.target }}.tar.gz.sha256

  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: dist
          merge-multiple: true

      - name: Aggregate checksums
        working-directory: dist
        run: |
          ls -la
          cat ./*.sha256 > checksums.sha256.tmp
          rm -f -- ./*.sha256
          mv checksums.sha256.tmp checksums.sha256
          ls -la

      - name: Upload to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${GITHUB_REF_NAME}" dist/*.tar.gz dist/checksums.sha256 --clobber
